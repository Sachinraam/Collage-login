<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPR College Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f4c81,#1aa37a);
}

.login-container{
    width:400px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    width:260px;
    margin-bottom:20px;
}

h2{
    color:#0f4c81;
    margin-bottom:5px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
    font-size:14px;
}

.input-group{
    margin-bottom:18px;
    text-align:left;
}

label{
    display:block;
    margin-bottom:6px;
    color:#333;
    font-weight:500;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#0f4c81;
    box-shadow:0 0 5px rgba(15,76,129,0.3);
}

.login-btn{
    width:100%;
    padding:12px;
    background:#0f4c81;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
}

.login-btn:hover{
    background:#08345a;
}

.footer{
    margin-top:15px;
    font-size:13px;
    color:#777;
}

a{
    color:#0f4c81;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="login-container">

    <img src="logo.png" alt="KPR College Logo" class="logo">

    <h2>Student Login</h2>
    <p class="subtitle">KPR College of Arts Science and Research</p>

    <form>
        <div class="input-group">
            <label>Username</label>
            <input type="text" placeholder="Enter Username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="footer">
        <p><a href="#">Forgot Password?</a></p>
    </div>

</div>

</body>
</html>
